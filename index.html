<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENEFA FCEE</title>
    <style>
body, html {
    margin: 0;
    padding: 0;
    width: 2944px;
    height: 192px;
    background-color: #000;
    overflow: hidden;
}

/* Contenedor visible final */
.tradingview-widget-container {
    width: 2944px;
    height: 192px;
    overflow: hidden;
}

/* Contenedor interno con escala */
.scale-wrapper {
    width: 2944px;
    height: 70px; /* altura real del widget */
    transform: scaleY(2.75); /* 192 / 70 ≈ 2.75 */
    transform-origin: top left;
}

.tradingview-widget-container__widget {
    width: 100%;
    height: 70px;
}
</style>
</head>
<body>

<div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <!-- Se usa el script oficial de TradingView -->
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
        "symbols": [
            {
                "proName": "FX_IDC:USDGTQ",
                "title": "USD/GTQ (Dólar)"
            },
            {
                "proName": "NASDAQ:AAPL",
                "title": "Apple Inc."
            },
            {
                "proName": "FX:EURUSD",
                "title": "Euro/Dólar"
            },
            {
                "description": "Bitcoin",
                "proName": "BINANCE:BTCUSDT"
            }
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": false,
        "displayMode": "adaptive",
        "locale": "es"
    }
    </script>
</div>
<!-- prueba -->
</body>
</html>
