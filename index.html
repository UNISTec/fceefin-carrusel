<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENEFA FCEE</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 2944px; /* Definición exacta para el player de VNNOX */
    height: 192px; 
    background-color: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.tradingview-widget-container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.scale-wrapper {
    /* Subimos a 3.8 para que llene bien y permita desplazarlo hacia abajo */
    transform: scale(3.8); 
    transform-origin: center;
    width: calc(100% / 3.8);
    height: 80px; /* Altura estándar del widget Ticker Tape */
    margin-top: 120px; /* Esto baja el widget para que no pegue arriba */
}

.tradingview-widget-container__widget {
    width: 100%;
    height: 100%;
}
</style>

</head>

<body>

<div class="tradingview-widget-container">

    <div class="scale-wrapper">
        <div class="tradingview-widget-container__widget"></div>
    </div>

    <script type="text/javascript"
        src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
        async>
    {
        "symbols": [
            {
                "proName": "FX_IDC:USDGTQ",
                "title": "USD/GTQ"
            },
            {
                "proName": "NASDAQ:AAPL",
                "title": "Apple"
            },
            {
                "proName": "FX:EURUSD",
                "title": "EUR/USD"
            },
            {
                "proName": "BINANCE:BTCUSDT",
                "title": "Bitcoin"
            }
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": false,
        "displayMode": "adaptive",
        "locale": "es"
    }
    </script>

</div>

</body>
</html>
