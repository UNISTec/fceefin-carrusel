<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cintillo LED Guatemala</title>
    <style>
        /* Estilos para asegurar pantalla completa exacta */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000; /* Fondo negro para LED */
            overflow: hidden; /* Evita barras de desplazamiento */
        }
        
        /* El contenedor ahora ocupará el 100% de la pantalla (2944x192) */
        .tradingview-widget-container {
            width: 100%;
            height: 100%; 
        }
    </style>
</head>
<body>

<div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
        "symbols": [
            {
                "proName": "FX_IDC:USDGTQ",
                "title": "USD/GTQ (Dólar)"
            },
            {
                "proName": "NASDAQ:AAPL",
                "title": "Apple Inc."
            },
            {
                "proName": "FX:EURUSD",
                "title": "Euro/Dólar"
            },
            {
                "proName": "BINANCE:BTCUSDT",
                "title": "Bitcoin"
            }
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": false,
        "displayMode": "adaptive",
        "locale": "es",
        "width": "100%",
        "height": "100%"
    }
    </script>
</div>

</body>
</html>
