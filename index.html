<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENEFA FCEE</title>
    <style>
body, html {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    background-color: #000;
    overflow: hidden;
}

/* Contenedor principal */
.tradingview-widget-container {
    position: absolute;
    top: 0px; /* ≈ 10 cm hacia abajo */
    left: 0;
    width: 1920px;
    height: 1080px;
}

/* Escalado (zoom) */
.scale-wrapper {
    transform: scale(5);
    transform-origin: center;

}

.tradingview-widget-container__widget {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <!-- Se usa el script oficial de TradingView -->
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
        "symbols": [
            {
                "proName": "FX_IDC:USDGTQ",
                "title": "USD/GTQ (Dólar)"
            },
            {
                "proName": "NASDAQ:AAPL",
                "title": "Apple Inc."
            },
            {
                "proName": "FX:EURUSD",
                "title": "Euro/Dólar"
            },
            {
                "description": "Bitcoin",
                "proName": "BINANCE:BTCUSDT"
            }
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": false,
        "displayMode": "adaptive",
        "locale": "es"
    }
    </script>
</div>
<!-- prueba -->
</body>
</html>
